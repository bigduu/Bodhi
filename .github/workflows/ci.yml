name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  LOTUS_SOURCE: package
  LOTUS_PACKAGE_NAME: "@bigduu/lotus"
  LOTUS_VERSION: latest

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Lotus package
        run: npm install --no-save "${LOTUS_PACKAGE_NAME}@${LOTUS_VERSION}"

      - name: Print Lotus source resolution
        run: npm run web:source:info

      - name: Build frontend
        run: npm run web:build

      - name: Verify staged frontend assets
        run: test -f .lotus-dist/index.html

  test-backend:
    name: Test Backend (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "bodhi-ci-${{ matrix.platform }}"
          cache-on-failure: true

      - name: Build backend
        run: cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --release

  build-tauri:
    name: Build Tauri App (${{ matrix.platform }})
    needs: [test-frontend, test-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
            artifact_name: "linux-x64"
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            artifact_name: "macos-arm64"
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
            artifact_name: "windows-x64"
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "bodhi-ci-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Lotus package
        shell: bash
        run: npm install --no-save "${LOTUS_PACKAGE_NAME}@${LOTUS_VERSION}"

      - name: Stage Lotus dist
        shell: bash
        run: |
          npm run web:build
          test -f .lotus-dist/index.html

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn
